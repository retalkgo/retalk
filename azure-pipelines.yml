trigger:
  - main

jobs:
  - job: Linux
    pool:
      vmImage: "ubuntu-latest"
    steps:
      - task: GoTool@0
        inputs:
          version: "1.21.0"
        displayName: "Setup go"
      - task: Go@0
        inputs:
          command: "get"
          arguments: "-d"
          workingDirectory: "$(System.DefaultWorkingDirectory)"
        displayName: "InstallDependencies"
      - task: Go@0
        inputs:
          command: "build"
          arguments: "-o bin/retalk"
          workingDirectory: "$(System.DefaultWorkingDirectory)"
        displayName: "Build"
      - task: CopyFiles@2
        inputs:
          TargetFolder: "$(Build.ArtifactStagingDirectory)"
      - task: PublishBuildArtifacts@1
        inputs:
          PathtoPublish: "$(Build.ArtifactStagingDirectory)/bin"
          ArtifactName: "linux"
        displayName: "PublishArtifacts"
  - job: Windows
    pool:
      vmImage: "windows-latest"
    steps:
      - task: GoTool@0
        inputs:
          version: "1.21.0"
        displayName: "Setup go"
      - task: Go@0
        inputs:
          command: "get"
          arguments: "-d"
          workingDirectory: "$(System.DefaultWorkingDirectory)"
        displayName: "InstallDependencies"
      - task: Go@0
        inputs:
          command: "build"
          arguments: "-o bin/retalk.exe"
          workingDirectory: "$(System.DefaultWorkingDirectory)"
        displayName: "Build"
      - task: CopyFiles@2
        inputs:
          TargetFolder: "$(Build.ArtifactStagingDirectory)"
      - task: PublishBuildArtifacts@1
        inputs:
          PathtoPublish: "$(Build.ArtifactStagingDirectory)/bin"
          ArtifactName: "windows"
        displayName: "PublishArtifacts"
  - job: MacOS
    pool:
      vmImage: "macos-latest"
    steps:
      - task: GoTool@0
        inputs:
          version: "1.21.0"
        displayName: "Setup go"
      - task: Go@0
        inputs:
          command: "get"
          arguments: "-d"
          workingDirectory: "$(System.DefaultWorkingDirectory)"
        displayName: "InstallDependencies"
      - task: Go@0
        inputs:
          command: "build"
          arguments: "-o bin/retalk"
          workingDirectory: "$(System.DefaultWorkingDirectory)"
        displayName: "Build"
      - task: CopyFiles@2
        inputs:
          TargetFolder: "$(Build.ArtifactStagingDirectory)"
      - task: PublishBuildArtifacts@1
        inputs:
          PathtoPublish: "$(Build.ArtifactStagingDirectory)/bin"
          ArtifactName: "macos"
        displayName: "PublishArtifacts"
