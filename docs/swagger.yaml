basePath: /
definitions:
  common.Resp:
    properties:
      data: {}
      msg:
        type: string
      success:
        type: boolean
    type: object
  entity.Author:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: integer
      is_admin:
        type: boolean
      link:
        type: string
      name:
        type: string
    type: object
  entity.Comment:
    properties:
      author_id:
        type: integer
      body:
        type: string
      created_at:
        type: string
      id:
        type: integer
      path:
        type: string
    type: object
  entity.CookedComment:
    properties:
      author:
        $ref: '#/definitions/entity.Author'
      body:
        type: string
      created_at:
        type: string
      id:
        type: integer
      path:
        type: string
    type: object
info:
  contact:
    email: retalk@redish101.top
    name: API 支持
  description: Retalk 后端 API 文档
  license:
    name: GPL-3.0
  title: Retalk API
  version: "1.0"
paths:
  /:
    get:
      description: 输出欢迎信息以验证安装
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/common.Resp'
            - properties:
                msg:
                  type: string
              type: object
      summary: 首页
      tags:
      - 首页
  /api/comment/add:
    post:
      description: 新增评论
      parameters:
      - description: 评论路径
        in: formData
        name: path
        required: true
        type: string
      - description: 发送者ID
        in: formData
        name: author_id
        required: true
        type: integer
      - description: 正文
        in: formData
        name: string
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/common.Resp'
            - properties:
                data:
                  $ref: '#/definitions/entity.Comment'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/common.Resp'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/common.Resp'
      summary: 新增评论
      tags:
      - 评论
  /api/comment/getAll:
    get:
      description: 获取所有评论
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/common.Resp'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/entity.CookedComment'
                  type: array
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/common.Resp'
      summary: 获取所有评论
      tags:
      - 评论
swagger: "2.0"
