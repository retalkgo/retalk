<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Retalk Demo</title>
	</head>
	<body>
		<h2>简体中文</h2>
		<div id="retalk_zh-CN" class="w-125"></div>
		<script type="module">
			import Retalk from "./src";

			new Retalk({
				el: "#retalk_zh-CN",
				server: "http://127.0.0.1:3000",
				lang: "zh-CN",
				gravatarProxy: "https://cn.gravatar.com/avatar/",
			});
		</script>
		<h2>文言文</h2>
		<div id="retalk_zh-wenyan" class="w-125"></div>
		<script type="module">
			import Retalk from "./src";

			new Retalk({
				el: "#retalk_zh-wenyan",
				server: "http://127.0.0.1:3000",
				lang: "zh-wenyan",
			});
		</script>
		<h2>English</h2>
		<div id="retalk_en" class="w-125"></div>
		<script type="module">
			import Retalk from "./src";

			new Retalk({
				el: "#retalk_en",
				server: "http://127.0.0.1:3000",
				lang: "en",
			});
		</script>
		<h2>Français</h2>
		<div id="retalk_fr" class="w-125"></div>
		<script type="module">
			import Retalk from "./src";

			new Retalk({
				el: "#retalk_fr",
				server: "http://127.0.0.1:3000",
				lang: "fr",
			});
		</script>
	</body>
</html>
